  <!-- Begins the main JavaScript module -->
  <script type="module">
    // Defines the Interface class for managing the game UI
    class Interface {
      // Constructor initializes the interface
      constructor() {
        // Gets the canvas element
        this.canvas = document.getElementById('canvas');
        // Gets the 2D rendering context
        this.ctx = this.canvas.getContext('2d');
        // Stores event callbacks
        this.callbacks = {};
        // Gets the burger menu element
        this.burgerMenu = document.getElementById('burger-menu');
        // Gets the game menu element
        this.gameMenu = document.getElementById('game-menu');
        // Tracks the current game
        this.currentGame = null;
        // Gets device pixel ratio for high-DPI displays
        this.dpr = window.devicePixelRatio || 1;
        // Resizes canvas to fit screen
        this.resizeCanvas();
        // Sets up input handlers
        this.setupInputs();
        // Fetches the games list and sets up menu
        this.fetchGamesList().then(() => this.setupGameMenu());
        // Listens for window resize events
        window.addEventListener('resize', () => this.resizeCanvas());
        // Displays initial message on canvas
        this.displayInitialMessage();
      }

      // Fetches the list of available games
      async fetchGamesList() {
        // Attempts to fetch games.json
        try {
          // Sends HTTP request for games.json
          const response = await fetch('./games/games.json');
          // Checks if response is successful
          if (!response.ok) {
            throw new Error(`HTTP error! Status: ${response.status}`);
          }
          // Parses JSON response
          const data = await response.json();
          // Stores games list
          this.gamesList = data.games;
          // Logs successful fetch
          console.log('Fetched games list:', this.gamesList);
        // Handles fetch errors
        } catch (error) {
          // Logs error to console
          console.error('Failed to fetch games list:', error);
          // Sets fallback games list
          this.gamesList = ['cosmic-defender', 'space-invaders', 'gorilla-rampage'];
        }
      }

      // Formats game folder names for display
      formatGameName(folderName) {
        // Splits name by hyphens, capitalizes words
        return folderName
          .split('-')
          .map(word => word.charAt(0).toUpperCase() + word.slice(1).toLowerCase())
          .join(' ');
      }

      // Displays initial message on canvas
      displayInitialMessage() {
        // Clears the canvas
        this.ctx.clearRect(0, 0, this.canvas.width, this.canvas.height);
        // Sets text color
        this.ctx.fillStyle = '#F5F5F5';
        // Sets font style
        this.ctx.font = '24px Arial, sans-serif';
        // Centers text horizontally
        this.ctx.textAlign = 'center';
        // Centers text vertically
        this.ctx.textBaseline = 'middle';
        // Displays instruction text
        this.ctx.fillText('Select a game from the menu', this.canvas.width / 2, this.canvas.height / 2);
      }

      // Registers event callbacks
      setCallback(event, callback) {
        // Stores callback for the event
        this.callbacks[event] = callback;
      }

      // Resizes canvas to fit screen
      resizeCanvas() {
        // Sets maximum width
        const maxWidth = Math.min(400, window.innerWidth * 0.9);
        // Calculates CSS width
        const cssWidth = Math.min(maxWidth, window.innerWidth * 0.9);
        // Gets current canvas height
        const cssHeight = this.canvas.getBoundingClientRect().height;
        // Sets canvas width
        this.canvas.width = cssWidth;
        // Sets canvas height
        this.canvas.height = cssHeight;
        // Sets CSS width
        this.canvas.style.width = `${cssWidth}px`;
        // Sets CSS height
        this.canvas.style.height = `${cssHeight}px`;
        // Calls resize callback if set
        if (this.callbacks.onResize) {
          this.callbacks.onResize(cssWidth, cssHeight);
        // Displays initial message if no callback
        } else {
          this.displayInitialMessage();
        }
      }

      // Sets up input event handlers
      setupInputs() {
        // Gets movement joystick element
        const moveJoystick = document.getElementById('move');
        // Gets aim joystick element
        const aimJoystick = document.getElementById('aim');
        // Gets action button element
        const actionButton = document.getElementById('action');

        // Defines joystick handling logic
        this.handleJoystick = (element, callback) => {
          // Tracks touch identifier
          let touchId = null;
          // Gets joystick knob
          const knob = element.querySelector('.knob');

          // Updates knob position and callback
          const updateKnob = (touch) => {
            // Exits if no touch
            if (!touch) return;
            // Gets joystick bounding rectangle
            const rect = element.getBoundingClientRect();
            // Calculates touch X position
            const x = touch.clientX - rect.left;
            // Calculates touch Y position
            const y = touch.clientY - rect.top;
            // Gets joystick center X
            const centerX = rect.width / 2;
            // Gets joystick center Y
            const centerY = rect.height / 2;
            // Sets maximum knob distance
            const maxDist = rect.width / 2 - knob.offsetWidth / 2;
            // Calculates X displacement
            let dx = x - centerX;
            // Calculates Y displacement
            let dy = y - centerY;
            // Calculates distance from center
            const dist = Math.sqrt(dx * dx + dy * dy);
            // Limits displacement if too far
            if (dist > maxDist) {
              dx = (dx / dist) * maxDist;
              dy = (dy / dist) * maxDist;
            }
            // Updates knob X position
            knob.style.left = centerX + dx + 'px';
            // Updates knob Y position
            knob.style.top = centerY + dy + 'px';
            // Normalizes X displacement
            const normalizedDx = dx / maxDist;
            // Normalizes Y displacement
            const normalizedDy = dy / maxDist;
            // Calculates magnitude
            const mag = Math.sqrt(normalizedDx * normalizedDx + normalizedDy * normalizedDy);
            // Checks if this is the aim joystick
            const isAimJoystick = element.id === 'aim';
            // Processes input if magnitude is significant
            if (mag > 0.2) {
              if (isAimJoystick) {
                // Calls callback with normalized values for aim
                callback(normalizedDx, normalizedDy, mag);
              } else {
                // Calls callback with unit vector for move
                callback(normalizedDx / mag, normalizedDy / mag, mag);
              }
            } else {
              // Calls callback with zero input
              callback(0, 0, 0);
            }
          };

          // Handles touch start events
          element.addEventListener('touchstart', (e) => {
            // Prevents default touch behavior
            e.preventDefault();
            // Ignores if already tracking a touch
            if (touchId !== null) return;
            // Gets first touch
            const touch = e.changedTouches[0];
            // Stores touch identifier
            touchId = touch.identifier;
            // Updates knob position
            updateKnob(touch);
          });

          // Handles touch move events
          element.addEventListener('touchmove', (e) => {
            // Ignores if not tracking a touch
            if (touchId === null) return;
            // Finds matching touch
            const touch = Array.from(e.touches).find(t => t.identifier === touchId);
            // Updates knob if touch found
            if (touch) {
              updateKnob(touch);
            }
          });

          // Handles touch end events
          element.addEventListener('touchend', (e) => {
            // Ignores if not tracking a touch
            if (touchId === null) return;
            // Finds matching touch
            const touch = Array.from(e.changedTouches).find(t => t.identifier === touchId);
            // Resets knob if touch ended
            if (touch) {
              touchId = null;
              knob.style.left = '50%';
              knob.style.top = '50%';
              callback(0, 0, 0);
            }
          });
        };

        // Sets up movement joystick
        this.handleJoystick(moveJoystick, (dx, dy, mag) => {
          // Calls move callback if set
          if (this.callbacks.onMove) this.callbacks.onMove(dx, dy, true);
        });

        // Sets up aim joystick
        this.handleJoystick(aimJoystick, (dx, dy, dist) => {
          // Gets canvas bounding rectangle
          const canvasRect = this.canvas.getBoundingClientRect();
          // Calculates canvas center X
          const centerX = canvasRect.left + this.canvas.width / 2;
          // Calculates canvas center Y
          const centerY = canvasRect.top + this.canvas.height / 2;
          // Sets scaling factor
          const scale = Math.max(this.canvas.width, this.canvas.height);
          // Calculates aim X position
          const aimX = centerX + dx * scale;
          // Calculates aim Y position
          const aimY = centerY + dy * scale;
          // Calls aim callback if set
          if (this.callbacks.onAim) this.callbacks.onAim(aimX - canvasRect.left, aimY - canvasRect.top);
          // Calls shoot callback if set
          if (this.callbacks.onShoot) this.callbacks.onShoot(dist, dist > 0.3, dx, dy);
        });

        // Sets up action button touch event
        actionButton.addEventListener('touchstart', () => {
          // Calls action callback if set
          if (this.callbacks.onAction) this.callbacks.onAction();
        });

        // Tracks keyboard state
        const keys = {};
        // Handles keydown events
        document.addEventListener('keydown', (e) => {
          // Marks key as pressed
          keys[e.code] = true;
          // Initializes movement variables
          let dx = 0, dy = 0;
          // Updates Y for W key
          if (keys['KeyW']) dy -= 1;
          // Updates Y for S key
          if (keys['KeyS']) dy += 1;
          // Updates X for A key
          if (keys['KeyA']) dx -= 1;
          // Updates X for D key
          if (keys['KeyD']) dx += 1;
          // Calculates movement magnitude
          const mag = Math.sqrt(dx * dx + dy * dy);
          // Normalizes movement if significant
          if (mag > 0) {
            dx /= mag;
            dy /= mag;
            // Calls move callback
            if (this.callbacks.onMove) this.callbacks.onMove(dx, dy, false);
          }
          // Calls action callback for spacebar
          if (e.code === 'Space' && this.callbacks.onAction) {
            this.callbacks.onAction();
          }
        });

        // Handles keyup events
        document.addEventListener('keyup', (e) => {
          // Marks key as released
          keys[e.code] = false;
          // Initializes movement variables
          let dx = 0, dy = 0;
          // Updates Y for W key
          if (keys['KeyW']) dy -= 1;
          // Updates Y for S key
          if (keys['KeyS']) dy += 1;
          // Updates X for A key
          if (keys['KeyA']) dx -= 1;
          // Updates X for D key
          if (keys['KeyD']) dx += 1;
          // Calculates movement magnitude
          const mag = Math.sqrt(dx * dx + dy * dy);
          // Normalizes movement if significant
          if (mag > 0) {
            dx /= mag;
            dy /= mag;
          }
          // Calls move callback
          if (this.callbacks.onMove) this.callbacks.onMove(dx, dy, false);
        });

        // Handles mouse movement for aiming
        this.canvas.addEventListener('mousemove', (e) => {
          // Gets canvas bounding rectangle
          const rect = this.canvas.getBoundingClientRect();
          // Calculates X position
          const x = e.clientX - rect.left;
          // Calculates Y position
          const y = e.clientY - rect.top;
          // Calls aim callback if set
          if (this.callbacks.onAim) this.callbacks.onAim(x, y);
        });

        // Tracks mouse button state
        let isMouseDown = false;
        // Handles mouse down events
        this.canvas.addEventListener('mousedown', (e) => {
          // Marks mouse as pressed
          isMouseDown = true;
          // Gets canvas bounding rectangle
          const rect = this.canvas.getBoundingClientRect();
          // Calculates distance from center
          const dist = Math.min(1, Math.sqrt((e.clientX - rect.left - this.canvas.width / 2) ** 2 + (e.clientY - rect.top - this.canvas.height / 2) ** 2) / 100);
          // Calls shoot callback if set
          if (this.callbacks.onShoot) this.callbacks.onShoot(dist, true, 0, 0);
        });

        // Handles mouse up events
        document.addEventListener('mouseup', () => {
          // Marks mouse as released
          isMouseDown = false;
          // Calls shoot callback if set
          if (this.callbacks.onShoot) this.callbacks.onShoot(0, false, 0, 0);
        });

        // Handles canvas clicks
        this.canvas.addEventListener('click', () => {
          // Calls restart callback if set
          if (this.callbacks.onRestart) this.callbacks.onRestart();
        });
      }

      // Sets up the game menu
      setupGameMenu() {
        // Clears existing menu content
        this.gameMenu.innerHTML = '';
        // Creates buttons for each game
        this.gamesList.forEach(folderName => {
          // Formats display name
          const displayName = this.formatGameName(folderName);
          // Creates button element
          const button = document.createElement('button');
          // Sets game data attribute
          button.setAttribute('data-game', folderName);
          // Sets button text
          button.textContent = displayName;
          // Adds button to menu
          this.gameMenu.appendChild(button);
        });

        // Toggles menu visibility on click
        this.burgerMenu.addEventListener('click', () => {
          // Toggles open class for burger menu
          this.burgerMenu.classList.toggle('open');
          // Toggles open class for game menu
          this.gameMenu.classList.toggle('open');
        });

        // Gets all game buttons
        const gameButtons = this.gameMenu.querySelectorAll('button');
        // Sets up click handlers for buttons
        gameButtons.forEach(button => {
          button.addEventListener('click', async () => {
            // Gets game name from data attribute
            const gameName = button.dataset.game;
            // Exits if no game name
            if (!gameName) return;

            // Closes menu
            this.burgerMenu.classList.remove('open');
            this.gameMenu.classList.remove('open');

            // Resets if a game is loaded
            if (this.currentGame) {
              // Clears callbacks
              this.callbacks = {};
              // Clears canvas
              this.ctx.clearRect(0, 0, this.canvas.width, this.canvas.height);
            }

            // Attempts to load the game
            try {
              // Dynamically imports game module
              const module = await import(`./games/${gameName}/game.js`);
              // Instantiates new game
              this.currentGame = new module.default(this);
            // Handles load errors
            } catch (error) {
              // Logs error to console
              console.error(`Failed to load game ${gameName}:`, error);
              // Sets text color
              this.ctx.fillStyle = '#F5F5F5';
              // Sets font style
              this.ctx.font = '24px Arial, sans-serif';
              // Centers text horizontally
              this.ctx.textAlign = 'center';
              // Centers text vertically
              this.ctx.textBaseline = 'middle';
              // Displays error message
              this.ctx.fillText(`Failed to load ${gameName}`, this.canvas.width / 2, this.canvas.height / 2);
              // Reverts to initial message after delay
              setTimeout(() => this.displayInitialMessage(), 2000);
            }
          });
        });
      }
    }

    // Creates a new Interface instance
    const ui = new Interface();
  </script>
<!-- Ends the body section -->
</body>
<!-- Ends the HTML document -->
</html>
